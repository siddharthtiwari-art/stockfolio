name: stockfolio
description: Personal stock tracker with watchlist, trends, and news markers.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # State management
  provider: ^6.1.2
  # HTTP
  http: ^1.2.1
  # Local storage
  shared_preferences: ^2.2.3
  # Charts
  fl_chart: ^0.69.0
  # JSON
  json_annotation: ^4.9.0
  # Intl / formatting
  intl: ^0.19.0
  # URL launcher (for news links)
  url_launcher: ^6.3.0
  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
